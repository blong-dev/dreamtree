syntax = "proto3";
package dreamtree.attest.v1;

option go_package = "github.com/blong-dev/dreamtree/x/attest";

import "cosmos/msg/v1/msg.proto";
import "gogoproto/gogo.proto";
import "amino/amino.proto";
import "cosmos_proto/cosmos.proto";
import "dreamtree/attest/v1/types.proto";

// Msg — the attest Msg service.
service Msg {
  option (cosmos.msg.v1.service) = true;

  // Attest records an attestation (including outcomes, which are attestations
  // with proof_type = OUTCOME targeting an earlier one).
  rpc Attest(MsgAttest) returns (MsgAttestResponse);

  // UpdateParams updates the module parameters (authority-gated).
  rpc UpdateParams(MsgUpdateParams) returns (MsgUpdateParamsResponse);
}

message MsgAttest {
  option (cosmos.msg.v1.signer) = "attestor";
  option (amino.name) = "dreamtree/x/attest/MsgAttest";

  string attestor = 1 [ (cosmos_proto.scalar) = "cosmos.AddressString" ];
  string subject = 2;
  ProofType proof_type = 3;
  string domain = 4;
  uint32 specificity_bps = 5;
  OutcomeKind outcome_kind = 6; // OUTCOME only
  uint64 target_id = 7;         // OUTCOME only — the attestation being validated/refuted
}

message MsgAttestResponse {
  uint64 id = 1;
  int64 height = 2;
}

message MsgUpdateParams {
  option (cosmos.msg.v1.signer) = "authority";
  option (amino.name) = "dreamtree/x/attest/MsgUpdateParams";

  string authority = 1 [ (cosmos_proto.scalar) = "cosmos.AddressString" ];
  Params params = 2 [ (gogoproto.nullable) = false, (amino.dont_omitempty) = true ];
}

message MsgUpdateParamsResponse {}
