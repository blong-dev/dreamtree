syntax = "proto3";

package dreamtree.attest.module.v1;

option go_package = "github.com/blong-dev/dreamtree/x/attest";

import "cosmos/app/v1alpha1/module.proto";

// Module is the app config object of the attest module.
message Module {
  option (cosmos.app.v1alpha1.module) = {
    go_import : "github.com/blong-dev/dreamtree/x/attest"
  };
  string authority = 1;
}
