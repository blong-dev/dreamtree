syntax = "proto3";
package dreamtree.photons.v1;

option go_package = "github.com/blong-dev/dreamtree/x/photons";

import "cosmos/query/v1/query.proto";
import "google/api/annotations.proto";
import "gogoproto/gogo.proto";
import "amino/amino.proto";
import "dreamtree/photons/v1/types.proto";

service Query {
  // Supply reports the peg: photons minted at ingestion (= data-seed count).
  rpc Supply(QuerySupplyRequest) returns (QuerySupplyResponse) {
    option (cosmos.query.v1.module_query_safe) = true;
    option (google.api.http).get = "/dreamtree/photons/v1/supply";
  }
  rpc Params(QueryParamsRequest) returns (QueryParamsResponse) {
    option (google.api.http).get = "/dreamtree/photons/v1/params";
  }
}

message QuerySupplyRequest {}
message QuerySupplyResponse {
  uint64 minted = 1;  // photons minted at ingestion = the peg (data-seed count)
}

message QueryParamsRequest {}
message QueryParamsResponse {
  Params params = 1 [ (gogoproto.nullable) = false, (amino.dont_omitempty) = true ];
}
