syntax = "proto3";
package dreamtree.reputation.v1;

option go_package = "github.com/blong-dev/dreamtree/x/reputation";

import "cosmos/msg/v1/msg.proto";
import "gogoproto/gogo.proto";
import "amino/amino.proto";
import "cosmos_proto/cosmos.proto";
import "dreamtree/reputation/v1/types.proto";

// Msg — reputation module Msg service. In P1 the only user-facing message is
// UpdateParams; contributions are produced by the x/attest hook, not submitted
// directly (making reputation un-forgeable by construction).
service Msg {
  option (cosmos.msg.v1.service) = true;
  rpc UpdateParams(MsgUpdateParams) returns (MsgUpdateParamsResponse);
  rpc SetDomainConfig(MsgSetDomainConfig) returns (MsgSetDomainConfigResponse);
}

message MsgUpdateParams {
  option (cosmos.msg.v1.signer) = "authority";
  option (amino.name) = "dreamtree/x/reputation/MsgUpdateParams";
  string authority = 1 [ (cosmos_proto.scalar) = "cosmos.AddressString" ];
  Params params = 2 [ (gogoproto.nullable) = false, (amino.dont_omitempty) = true ];
}
message MsgUpdateParamsResponse {}

// SetDomainConfig — governance sets a domain's saturation/obsolescence tiers.
message MsgSetDomainConfig {
  option (cosmos.msg.v1.signer) = "authority";
  option (amino.name) = "dreamtree/x/reputation/MsgSetDomainConfig";
  string authority = 1 [ (cosmos_proto.scalar) = "cosmos.AddressString" ];
  DomainConfig config = 2 [ (gogoproto.nullable) = false, (amino.dont_omitempty) = true ];
}
message MsgSetDomainConfigResponse {}
