syntax = "proto3";
package dreamtree.reputation.v1;

option go_package = "github.com/blong-dev/dreamtree/x/reputation";

import "gogoproto/gogo.proto";
import "amino/amino.proto";
import "cosmos_proto/cosmos.proto";

// RateBucket — the decay class a contribution decays at (read-time projection).
enum RateBucket {
  RATE_BUCKET_UNSPECIFIED = 0;
  RATE_BUCKET_PERMANENT = 1;    // never decays (origin authorship)
  RATE_BUCKET_DURABLE_25Y = 2;  // validated outcomes — ~25yr half-life (P3)
  RATE_BUCKET_RIGOR = 3;        // ~17yr
  RATE_BUCKET_USE = 4;          // ~9yr
  RATE_BUCKET_REPLICATION = 5;  // ~45yr
  RATE_BUCKET_ENDORSEMENT = 6;  // endorsement inheritance (P4)
}

// Contribution — an immutable, settled increment to a signer's reputation in a
// domain. This is the ONLY reputation state stored. R(j,k,t) is a projection
// over these (baseline + Σ magnitude·relevance·decay), computed at read time.
// magnitude is fixed-point (LegacyDec) because settlement is consensus math;
// the exponential decay applied to it is float, read-side only.
message Contribution {
  option (amino.name) = "dreamtree/x/reputation/Contribution";

  uint64 id = 1;
  // signer — whose reputation this moves (j).
  string signer = 2 [ (cosmos_proto.scalar) = "cosmos.AddressString" ];
  // domain — the 5-level taxonomy path (k).
  string domain = 3;
  // magnitude — signed fixed-point increment (may be negative for reversals).
  string magnitude = 4 [
    (cosmos_proto.scalar) = "cosmos.Dec",
    (gogoproto.customtype) = "cosmossdk.io/math.LegacyDec",
    (gogoproto.nullable) = false
  ];
  RateBucket rate_bucket = 5;
  // settled_at — block time (unix) the contribution took effect; decay clock start.
  int64 settled_at = 6;
  // source_att_id — the attestation/outcome that produced it (provenance; 0 = none).
  uint64 source_att_id = 7;
  int64 height = 8;
}

// DomainConfig — per-domain governance tiers (saturation + obsolescence).
// Absent domains use the standard defaults.
message DomainConfig {
  string path = 1;
  // saturation_point S — log-dampening threshold (small 5 / standard 10 / large 50).
  string saturation_point = 2 [
    (cosmos_proto.scalar) = "cosmos.Dec",
    (gogoproto.customtype) = "cosmossdk.io/math.LegacyDec",
    (gogoproto.nullable) = false
  ];
  // obsolescence_multiplier — scales decay (foundational .3 / standard 1 / frontier 3).
  string obsolescence_multiplier = 3 [
    (cosmos_proto.scalar) = "cosmos.Dec",
    (gogoproto.customtype) = "cosmossdk.io/math.LegacyDec",
    (gogoproto.nullable) = false
  ];
}

// Params — the reputation levers (parameters.md). Decimal strings are read-side
// (decay/saturation) inputs; kept as strings, parsed in the projection.
message Params {
  string baseline_kyc = 1;              // "1.0"
  string dampening_k = 2;               // "5.0" — global log-dampening strength
  string saturation_standard = 3;       // "10.0" — default S tier
  string obsolescence_standard = 4;     // "1.0" — default obsolescence

  // per-bucket decay λ (per year); origin/permanent = 0
  string lambda_permanent = 5;          // "0.0"
  string lambda_durable = 6;            // "0.0277" — ln2/25 (~25yr half-life)
  string lambda_rigor = 7;              // "0.04"
  string lambda_use = 8;                // "0.08"
  string lambda_replication = 9;        // "0.015"
  string lambda_endorsement = 10;       // "0.08"

  // P1 unvalidated-bet magnitude: an attestation contributes this × (spec × type_weight).
  string attest_bet_scale = 11;         // "0.1" — small; the big moves come from validated outcomes (P3)

  // P2/P3 review-window + outcome levers (parameters.md).
  string neg_asymmetry = 12;            // "2.0" — refutation hits 2× harder than corroboration
  string outcome_beta = 13;             // "1.0" — β in M_O = min(M_cap, β·S_issuance·√cred)
  string outcome_cap_mult = 14;         // "5.0" — M_cap = this × S_issuance
  string review_window_base = 15;       // "1.0" days — base of τ = base·√(M/threshold)
  string review_window_threshold = 16;  // "1.0"
  // co-attestor propagation: another attestor on the same work moves this × M_O.
  string coattestor_weight = 17;        // "0.25"
  // endorsement inheritance: B inherits this × endorser's standing (geometric
  // multi-hop decay + 2-hop cred recursion fall out of standing including
  // endorsement contributions).
  string endorse_inherit = 18;          // "0.25"
  // endorsement breadth cap (ratified 2026-07-17): per (endorsee, domain) the
  // ENDORSEMENT-bucket contributions aggregate paper-shape with
  // E_cap = e_cap_mult × max(e_i) — a crowd of endorsers can at most double
  // the strongest single endorsement. INTERIM value; backtest tunes.
  string e_cap_mult = 19;               // "2.0"
}

// PendingKind — what a pending event settles into.
enum PendingKind {
  PENDING_KIND_UNSPECIFIED = 0;
  PENDING_KIND_BET = 1;      // an unvalidated attestation bet (settles to a bet contribution)
  PENDING_KIND_OUTCOME = 2;  // an outcome on an attestation (settles to the M_O propagation)
}

// PropKind — how a propagation target relates to the outcome (sets its weight).
enum PropKind {
  PROP_KIND_UNSPECIFIED = 0;
  PROP_KIND_COATTESTOR = 1;  // another attestor on the same work (weight = coattestor_weight × base)
  PROP_KIND_ENDORSER = 2;    // an endorser of the contributor (weight = endorse_inherit; = liability)
}

// PropTarget — a party (besides the contributor) whose R moves when an outcome
// settles. Captured at outcome time from the attestation graph; the reputation
// module applies the kind's weight at settlement.
message PropTarget {
  string address = 1 [ (cosmos_proto.scalar) = "cosmos.AddressString" ];
  string domain = 2;
  PropKind kind = 3;
  // base_factor — the kind-specific base (a co-attestor's specificity; 1 for an
  // endorser). Final weight = param(kind) × base_factor.
  string base_factor = 4 [
    (cosmos_proto.scalar) = "cosmos.Dec",
    (gogoproto.customtype) = "cosmossdk.io/math.LegacyDec",
    (gogoproto.nullable) = false
  ];
}

// PendingEvent — a reputation-moving event inside its review window. At
// close_time, EndBlock integrates its accumulators and settles it into
// Contribution(s). Nothing here moves R until settled.
message PendingEvent {
  option (amino.name) = "dreamtree/x/reputation/PendingEvent";

  uint64 id = 1;
  PendingKind kind = 2;

  // BET fields (kind = BET): whose R, and the bet magnitude/bucket.
  string signer = 3 [ (cosmos_proto.scalar) = "cosmos.AddressString" ];
  string domain = 4;
  RateBucket rate_bucket = 5;

  // OUTCOME fields (kind = OUTCOME): the contested claim on target_att.
  uint64 target_att_id = 6;         // the attestation being validated/refuted
  string target_attestor = 7;       // its author (the contributor whose R moves)
  string target_domain = 8;
  string target_s_issuance = 9 [    // rational S(target, t_issuance) — the M_O input
    (cosmos_proto.scalar) = "cosmos.Dec",
    (gogoproto.customtype) = "cosmossdk.io/math.LegacyDec",
    (gogoproto.nullable) = false
  ];
  bool outcome_refutes = 10;        // true = refuted (−, 2×), false = validated (+)
  uint64 counter_target_pending = 11; // reversal: the settled outcome this counter-outcome overturns (0 = none)

  // base_magnitude — the event's own magnitude before window integration
  // (the bet, or the reporter's initial M_O contribution).
  string base_magnitude = 12 [
    (cosmos_proto.scalar) = "cosmos.Dec",
    (gogoproto.customtype) = "cosmossdk.io/math.LegacyDec",
    (gogoproto.nullable) = false
  ];
  // accumulators — corroboration/refutation gathered during the window (paper-shape).
  string corroboration = 13 [
    (cosmos_proto.scalar) = "cosmos.Dec",
    (gogoproto.customtype) = "cosmossdk.io/math.LegacyDec",
    (gogoproto.nullable) = false
  ];
  string refutation = 14 [
    (cosmos_proto.scalar) = "cosmos.Dec",
    (gogoproto.customtype) = "cosmossdk.io/math.LegacyDec",
    (gogoproto.nullable) = false
  ];

  int64 opened_at = 15;   // block time enqueued
  int64 close_time = 16;  // opened_at + τ(base_magnitude) seconds
  uint64 source_att_id = 17;

  // prop_targets — co-attestors + contributor endorsers who also move at
  // settlement (outcome propagation lines 2-3). Captured at outcome time.
  repeated PropTarget prop_targets = 18 [ (gogoproto.nullable) = false ];
}

message GenesisState {
  Params params = 1 [ (gogoproto.nullable) = false, (amino.dont_omitempty) = true ];
  repeated Contribution contributions = 2 [ (gogoproto.nullable) = false, (amino.dont_omitempty) = true ];
  repeated DomainConfig domain_configs = 3 [ (gogoproto.nullable) = false, (amino.dont_omitempty) = true ];
  uint64 next_id = 4;
  repeated PendingEvent pending_events = 5 [ (gogoproto.nullable) = false, (amino.dont_omitempty) = true ];
  uint64 next_pending_id = 6;
  // verified — the verified-identity set (upgrade-1 R2): addresses granted the
  // baseline_kyc floor. Standing for everyone else starts at ZERO. Managed by
  // the governance authority via MsgSetVerified (v0 stand-in; the identity
  // layer is the durable home).
  repeated string verified = 7;
}
