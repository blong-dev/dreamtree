syntax = "proto3";
package dreamtree.seeds.v1;

option go_package = "github.com/blong-dev/dreamtree/x/seeds";

import "gogoproto/gogo.proto";
import "amino/amino.proto";
import "cosmos_proto/cosmos.proto";

// Params defines the parameters of the seeds module.
message Params {
  option (amino.name) = "dreamtree/x/seeds/Params";

  // max_commitment_bytes bounds the size of a commitment digest (hex/base64
  // string). A commitment is a hash or Merkle root, never a body, so this is
  // small by design. 0 means use the module default.
  uint32 max_commitment_bytes = 1;

  // max_source_ref_bytes bounds the opaque origin reference length.
  uint32 max_source_ref_bytes = 2;
}

// Seed is a commitment anchored on-chain: the hash (or Merkle root) of a
// wallet record, an attestation, or any provenance-bearing body that lives in
// the data fabric. The body never enters consensus; only this commitment does.
message Seed {
  option (amino.name) = "dreamtree/x/seeds/Seed";

  // id is the global monotonic sequence assigned at commit time.
  uint64 id = 1;

  // committer is the address that anchored this commitment.
  string committer = 2 [ (cosmos_proto.scalar) = "cosmos.AddressString" ];

  // subject identifies what the commitment is about — typically the owning
  // wallet's DID (e.g. did:web:id.dreamtree.org:w:<uuid>). Free-form so the
  // knowledge graph and other producers can namespace their own subjects.
  string subject = 3;

  // commitment is the hex-encoded digest (sha256 of a body, or a Merkle root
  // of a batch). This is the anchor; the body stays in the fabric.
  string commitment = 4;

  // kind names what was committed: "record", "batch_root", "attestation",
  // "kg_claim", etc. Producers own their kinds.
  string kind = 5;

  // source_ref is an opaque origin pointer (a roots record id, a batch label,
  // a gnosis observation id) — enough to locate the body off-chain.
  string source_ref = 6;

  // height is the block height at which this seed was committed.
  int64 height = 7;

  // committed_at is the block time (unix seconds) of the commit.
  int64 committed_at = 8;

  // data_type is the dt.*@v type of the underlying record — the priceable type
  // for the marketplace (per-type N_a). Empty for non-priceable commits.
  string data_type = 9;

  // batch_id is the containing batch (synthesized on read; seeds are stored
  // as batches — see Batch).
  uint64 batch_id = 10;

  // leaf_index is this seed's position among the batch's NEW leaves
  // (id - batch.first_seed_id); synthesized on read.
  uint32 leaf_index = 11;
}

// Batch is the stored anchoring unit (seed = atom; batching is a commitment
// strategy, never a unit change — docs/specs/seed-atom-conformance.md). A batch
// registers new_count leaf-seeds [first_seed_id, first_seed_id+new_count) under
// one Merkle root; individual Seed objects are synthesized on read. A single
// CommitSeed is stored as a batch of one (merkle_root = the commitment).
message Batch {
  option (amino.name) = "dreamtree/x/seeds/Batch";

  // id is the monotonic batch sequence.
  uint64 id = 1;

  // first_seed_id is the first leaf-seed id this batch registered.
  uint64 first_seed_id = 2;

  // new_count is how many NEW distinct contributions this batch registered
  // (seed ids allocated, photons minted). Convergence rule: re-observed atoms
  // do not re-mint — sigma accrues, supply doesn't.
  uint32 new_count = 3;

  // leaf_count is the total number of leaves under merkle_root (>= new_count);
  // converged (already-registered) atoms stay provable against this root too.
  uint32 leaf_count = 4;

  // merkle_root is the hex-encoded root over the batch's leaf ids (for a
  // batch of one, the leaf digest itself).
  string merkle_root = 5;

  // committer is the address that anchored this batch.
  string committer = 6 [ (cosmos_proto.scalar) = "cosmos.AddressString" ];

  // subject identifies what the leaves are about (owning wallet DID etc.).
  string subject = 7;

  // kind names what each LEAF is: "record", "kg_claim", ... ("batch_root" is
  // retired as a kind — the aggregate is no longer a seed kind).
  string kind = 8;

  // source_ref is an opaque origin pointer (e.g. "reflow:gen:61932").
  string source_ref = 9;

  // data_type is the dt.*@v type of the leaves (per-type N_a pricing).
  string data_type = 10;

  // height / committed_at anchor the batch in chain time.
  int64 height = 11;
  int64 committed_at = 12;
}

// GenesisState is the seeds state provided at genesis.
message GenesisState {
  // params defines the module parameters.
  Params params = 1
      [ (gogoproto.nullable) = false, (amino.dont_omitempty) = true ];

  // batches is the set of anchored batches (for export/import).
  repeated Batch batches = 2
      [ (gogoproto.nullable) = false, (amino.dont_omitempty) = true ];

  // next_id is the leaf-seed sequence value the next commit will take.
  uint64 next_id = 3;

  // next_batch_id is the batch sequence value the next commit will take.
  uint64 next_batch_id = 4;
}
