syntax = "proto3";
package dreamtree.seeds.v1;

option go_package = "github.com/blong-dev/dreamtree/x/seeds";

import "cosmos/msg/v1/msg.proto";
import "gogoproto/gogo.proto";
import "amino/amino.proto";
import "cosmos_proto/cosmos.proto";
import "dreamtree/seeds/v1/types.proto";

// Msg defines the seeds Msg service.
service Msg {
  option (cosmos.msg.v1.service) = true;

  // CommitSeed anchors a commitment on-chain.
  rpc CommitSeed(MsgCommitSeed) returns (MsgCommitSeedResponse);

  // UpdateParams updates the module parameters.
  rpc UpdateParams(MsgUpdateParams) returns (MsgUpdateParamsResponse);
}

// MsgCommitSeed is the request type for the Msg/CommitSeed RPC.
message MsgCommitSeed {
  option (cosmos.msg.v1.signer) = "committer";
  option (amino.name) = "dreamtree/x/seeds/MsgCommitSeed";

  // committer is the address anchoring the commitment (the signer).
  string committer = 1 [ (cosmos_proto.scalar) = "cosmos.AddressString" ];

  // subject — what the commitment is about (usually a wallet DID).
  string subject = 2;

  // commitment — the hex-encoded digest or Merkle root.
  string commitment = 3;

  // kind — the producer-owned kind label.
  string kind = 4;

  // source_ref — opaque off-chain locator for the committed body.
  string source_ref = 5;
}

// MsgCommitSeedResponse is the response type for the Msg/CommitSeed RPC.
message MsgCommitSeedResponse {
  // id is the sequence assigned to the newly committed seed.
  uint64 id = 1;

  // height is the block height at which it was committed.
  int64 height = 2;
}

// MsgUpdateParams is the Msg/UpdateParams request type.
message MsgUpdateParams {
  option (cosmos.msg.v1.signer) = "authority";
  option (amino.name) = "dreamtree/x/seeds/MsgUpdateParams";

  // authority controls the module (defaults to the gov module).
  string authority = 1 [ (cosmos_proto.scalar) = "cosmos.AddressString" ];

  // params — all parameters must be supplied.
  Params params = 2
      [ (gogoproto.nullable) = false, (amino.dont_omitempty) = true ];
}

// MsgUpdateParamsResponse defines the response for Msg/UpdateParams.
message MsgUpdateParamsResponse {}
