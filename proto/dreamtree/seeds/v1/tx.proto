syntax = "proto3";
package dreamtree.seeds.v1;

option go_package = "github.com/blong-dev/dreamtree/x/seeds";

import "cosmos/msg/v1/msg.proto";
import "gogoproto/gogo.proto";
import "amino/amino.proto";
import "cosmos_proto/cosmos.proto";
import "dreamtree/seeds/v1/types.proto";

// Msg defines the seeds Msg service.
service Msg {
  option (cosmos.msg.v1.service) = true;

  // CommitSeed anchors a single commitment on-chain (stored as a batch of one).
  rpc CommitSeed(MsgCommitSeed) returns (MsgCommitSeedResponse);

  // CommitBatch anchors N leaf-seeds under one Merkle root in one tx
  // (seed = atom; docs/specs/seed-atom-conformance.md).
  rpc CommitBatch(MsgCommitBatch) returns (MsgCommitBatchResponse);

  // UpdateParams updates the module parameters.
  rpc UpdateParams(MsgUpdateParams) returns (MsgUpdateParamsResponse);
}

// MsgCommitSeed is the request type for the Msg/CommitSeed RPC.
message MsgCommitSeed {
  option (cosmos.msg.v1.signer) = "committer";
  option (amino.name) = "dreamtree/x/seeds/MsgCommitSeed";

  // committer is the address anchoring the commitment (the signer).
  string committer = 1 [ (cosmos_proto.scalar) = "cosmos.AddressString" ];

  // subject — what the commitment is about (usually a wallet DID).
  string subject = 2;

  // commitment — the hex-encoded digest or Merkle root.
  string commitment = 3;

  // kind — the producer-owned kind label.
  string kind = 4;

  // source_ref — opaque off-chain locator for the committed body.
  string source_ref = 5;

  // data_type — the dt.*@v type of the underlying record (for marketplace pricing).
  string data_type = 6;
}

// MsgCommitSeedResponse is the response type for the Msg/CommitSeed RPC.
message MsgCommitSeedResponse {
  // id is the sequence assigned to the newly committed seed.
  uint64 id = 1;

  // height is the block height at which it was committed.
  int64 height = 2;
}

// MsgCommitBatch is the request type for the Msg/CommitBatch RPC. It registers
// new_count leaf-seeds (one per NEW distinct contribution) under one Merkle
// root. Convergence rule: re-observed atoms are counted in leaf_count (they
// stay provable against this root) but not in new_count (no re-mint).
message MsgCommitBatch {
  option (cosmos.msg.v1.signer) = "committer";
  option (amino.name) = "dreamtree/x/seeds/MsgCommitBatch";

  // committer is the address anchoring the batch (the signer).
  string committer = 1 [ (cosmos_proto.scalar) = "cosmos.AddressString" ];

  // subject — what the leaves are about (usually a wallet DID / producer ns).
  string subject = 2;

  // merkle_root — hex-encoded root over the batch's leaf ids.
  string merkle_root = 3;

  // leaf_count — total leaves under the root (provable set).
  uint32 leaf_count = 4;

  // new_count — NEW distinct contributions: seed ids allocated, photons minted.
  uint32 new_count = 5;

  // kind — the LEAF kind ("record", "kg_claim", ...).
  string kind = 6;

  // source_ref — opaque off-chain locator (e.g. "reflow:gen:61932").
  string source_ref = 7;

  // data_type — the dt.*@v type of the leaves (marketplace pricing).
  string data_type = 8;
}

// MsgCommitBatchResponse is the response type for the Msg/CommitBatch RPC.
message MsgCommitBatchResponse {
  // first_id is the first allocated leaf-seed id; the batch registered
  // [first_id, first_id + new_count).
  uint64 first_id = 1;

  // batch_id is the batch's own sequence id.
  uint64 batch_id = 2;

  // height is the block height at which it was committed.
  int64 height = 3;
}

// MsgUpdateParams is the Msg/UpdateParams request type.
message MsgUpdateParams {
  option (cosmos.msg.v1.signer) = "authority";
  option (amino.name) = "dreamtree/x/seeds/MsgUpdateParams";

  // authority controls the module (defaults to the gov module).
  string authority = 1 [ (cosmos_proto.scalar) = "cosmos.AddressString" ];

  // params — all parameters must be supplied.
  Params params = 2
      [ (gogoproto.nullable) = false, (amino.dont_omitempty) = true ];
}

// MsgUpdateParamsResponse defines the response for Msg/UpdateParams.
message MsgUpdateParamsResponse {}
