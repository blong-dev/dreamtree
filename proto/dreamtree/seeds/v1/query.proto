syntax = "proto3";
package dreamtree.seeds.v1;

option go_package = "github.com/blong-dev/dreamtree/x/seeds";

import "cosmos/base/query/v1beta1/pagination.proto";
import "cosmos/query/v1/query.proto";
import "google/api/annotations.proto";
import "gogoproto/gogo.proto";
import "amino/amino.proto";
import "dreamtree/seeds/v1/types.proto";

// Query defines the seeds gRPC query service.
service Query {
  // Seed returns a single leaf-seed by id (synthesized from its batch).
  rpc Seed(QuerySeedRequest) returns (QuerySeedResponse) {
    option (cosmos.query.v1.module_query_safe) = true;
    option (google.api.http).get = "/dreamtree/seeds/v1/seed/{id}";
  }

  // Batch returns a stored anchoring batch by batch id.
  rpc Batch(QueryBatchRequest) returns (QueryBatchResponse) {
    option (cosmos.query.v1.module_query_safe) = true;
    option (google.api.http).get = "/dreamtree/seeds/v1/batch/{id}";
  }

  // Seeds lists anchored batches (one entry per batch — a batch may register
  // thousands of leaf-seeds; resolve individual leaves via Seed(id)).
  rpc Seeds(QuerySeedsRequest) returns (QuerySeedsResponse) {
    option (cosmos.query.v1.module_query_safe) = true;
    option (google.api.http).get = "/dreamtree/seeds/v1/seeds";
  }

  // SeedsBySubject returns commitments for a given subject (e.g. a wallet DID).
  rpc SeedsBySubject(QuerySeedsBySubjectRequest)
      returns (QuerySeedsBySubjectResponse) {
    option (cosmos.query.v1.module_query_safe) = true;
    option (google.api.http).get =
        "/dreamtree/seeds/v1/seeds/subject/{subject}";
  }

  // Params returns the module parameters.
  rpc Params(QueryParamsRequest) returns (QueryParamsResponse) {
    option (google.api.http).get = "/dreamtree/seeds/v1/params";
  }
}

message QuerySeedRequest { uint64 id = 1; }
message QuerySeedResponse {
  Seed seed = 1 [ (gogoproto.nullable) = false, (amino.dont_omitempty) = true ];
}

message QueryBatchRequest { uint64 id = 1; }
message QueryBatchResponse {
  Batch batch = 1
      [ (gogoproto.nullable) = false, (amino.dont_omitempty) = true ];
}

message QuerySeedsRequest {
  cosmos.base.query.v1beta1.PageRequest pagination = 1;
}
message QuerySeedsResponse {
  repeated Batch batches = 1
      [ (gogoproto.nullable) = false, (amino.dont_omitempty) = true ];
  cosmos.base.query.v1beta1.PageResponse pagination = 2;
}

message QuerySeedsBySubjectRequest {
  string subject = 1;
  cosmos.base.query.v1beta1.PageRequest pagination = 2;
}
message QuerySeedsBySubjectResponse {
  repeated Batch batches = 1
      [ (gogoproto.nullable) = false, (amino.dont_omitempty) = true ];
  cosmos.base.query.v1beta1.PageResponse pagination = 2;
}

message QueryParamsRequest {}
message QueryParamsResponse {
  Params params = 1
      [ (gogoproto.nullable) = false, (amino.dont_omitempty) = true ];
}
